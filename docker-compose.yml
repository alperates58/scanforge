name: scanforge

x-backend-environment: &backend-environment
  APP_NAME: ${APP_NAME:-ScanForge}
  APP_ENV: ${APP_ENV:-local}
  APP_KEY: ${APP_KEY:-}
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_URL: ${APP_URL:-http://localhost:8000}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3003}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3003}
  SCANFORGE_VERSION: ${SCANFORGE_VERSION:-0.5.0-phase05}
  SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:3003,127.0.0.1:3003,localhost:8000,127.0.0.1:8000}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-scanforge}
  DB_USERNAME: ${DB_USERNAME:-scanforge}
  DB_PASSWORD: ${DB_PASSWORD:-change-me}
  CACHE_STORE: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: database
  REDIS_CLIENT: predis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  AI_PROVIDER: ${AI_PROVIDER:-deepseek}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
  ALLOW_UNVERIFIED_DOMAINS: ${ALLOW_UNVERIFIED_DOMAINS:-false}
  SCAN_SAFE_MODE: ${SCAN_SAFE_MODE:-true}
  SCAN_DEFAULT_TIMEOUT_SECONDS: ${SCAN_DEFAULT_TIMEOUT_SECONDS:-900}
  SCAN_MAX_CONCURRENT_JOBS: ${SCAN_MAX_CONCURRENT_JOBS:-2}
  SCAN_SAME_TARGET_COOLDOWN_MINUTES: ${SCAN_SAME_TARGET_COOLDOWN_MINUTES:-15}
  SCANFORGE_ENABLE_DEEP_SCAN: ${SCANFORGE_ENABLE_DEEP_SCAN:-false}
  SCANFORGE_WORKER_ID: ${SCANFORGE_WORKER_ID:-}
  SCANFORGE_WORKER_MAX_JOBS: ${SCANFORGE_WORKER_MAX_JOBS:-1}
  SCANFORGE_WORKER_HEARTBEAT_SECONDS: ${SCANFORGE_WORKER_HEARTBEAT_SECONDS:-30}
  SCANFORGE_SCAN_LOCK_TTL_SECONDS: ${SCANFORGE_SCAN_LOCK_TTL_SECONDS:-900}
  SCANFORGE_JOB_TIMEOUT_SECONDS: ${SCANFORGE_JOB_TIMEOUT_SECONDS:-300}
  SCANFORGE_JOB_MAX_REQUESTS: ${SCANFORGE_JOB_MAX_REQUESTS:-50}
  SCANFORGE_JOB_MAX_RUNTIME: ${SCANFORGE_JOB_MAX_RUNTIME:-300}
  SCANFORGE_JOB_MAX_MEMORY_MB: ${SCANFORGE_JOB_MAX_MEMORY_MB:-256}
  SCANNER_MOCK_WORKER_ENABLED: ${SCANNER_MOCK_WORKER_ENABLED:-true}
  DOMAIN_VERIFICATION_TIMEOUT_SECONDS: ${DOMAIN_VERIFICATION_TIMEOUT_SECONDS:-5}
  DOMAIN_VERIFICATION_MAX_REDIRECTS: ${DOMAIN_VERIFICATION_MAX_REDIRECTS:-3}
  DISCOVERY_TIMEOUT_SECONDS: ${DISCOVERY_TIMEOUT_SECONDS:-5}
  DISCOVERY_MAX_REDIRECTS: ${DISCOVERY_MAX_REDIRECTS:-5}
  DISCOVERY_MAX_BODY_BYTES: ${DISCOVERY_MAX_BODY_BYTES:-262144}
  DISCOVERY_WHOIS_ENABLED: ${DISCOVERY_WHOIS_ENABLED:-false}
  DISCOVERY_REVERSE_DNS_ENABLED: ${DISCOVERY_REVERSE_DNS_ENABLED:-false}
  SCANFORGE_FINGERPRINT_ANALYSIS_VERSION: ${SCANFORGE_FINGERPRINT_ANALYSIS_VERSION:-fingerprint-v1}

services:
  backend:
    build:
      context: ./backend
    environment:
      <<: *backend-environment
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    build:
      context: ./backend
    command: ["php", "artisan", "queue:work", "redis", "--queue=scan-high,scan-normal,scan-low,maintenance,ai,notification,default", "--sleep=3", "--tries=2", "--timeout=900"]
    environment:
      <<: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3003}:3000"
    depends_on:
      - backend

  scanner:
    build:
      context: ./scanner
    environment:
      ALLOW_UNVERIFIED_DOMAINS: ${ALLOW_UNVERIFIED_DOMAINS:-false}
      SCAN_SAFE_MODE: ${SCAN_SAFE_MODE:-true}
      SCANNER_HEARTBEAT_SECONDS: ${SCANNER_HEARTBEAT_SECONDS:-30}
      SCANNER_MOCK_OUTPUT: /data/mock-scan-result.json
    privileged: false
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - scanner_data:/data
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-scanforge}
      POSTGRES_USER: ${DB_USERNAME:-scanforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  scanner_data:
